services:
  keycloak:
    container_name: keycloak

    # Keycloak 최신 안정 버전 (2025 기준)
    #image: quay.io/keycloak/keycloak:26.6.0
    build: .
    
    # 운영 모드로 실행 --optimized를 추가하여 부팅 시 재빌드 과정을 생략합니다.
    command: start --optimized
    ports:
      # 내부/프록시 연동용 HTTP
      - "8180:8080"
      # (직접 HTTPS를 쓸 경우만 필요)
      - "8443:8443"

    environment:
      # -----------------------------
      # 관리자 계정 (초기 1회 생성)
      # -----------------------------
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Admin2580!

      # -----------------------------
      # 데이터베이스 설정 (운영 필수)
      # -----------------------------
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloakpass
      
      # [성능 최적화 핵심 - 캐시]
      # 단일 서버라면 local로 설정해야 CPU 점유율이 안정화됩니다.
      KC_CACHE: local
      
      # -----------------------------
      # 프록시 환경 설정
      # (Nginx Proxy Manager 사용 시 필수)
      # -----------------------------
      #KC_PROXY: edge
      KC_HTTP_ENABLED: true
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: true
      KC_PROXY_HEADERS: xforwarded

      # 외부에서 접근하는 도메인
      # (토큰 issuer, redirect URI 생성에 사용됨)
      KC_HOSTNAME: auth.itapi.org

      # [JVM 메모리 최적화]
      # Orange Pi 5 환경에서 메모리 널뛰기를 방지합니다.
      JAVA_OPTS_APPEND: "-Xms512m -Xmx2048m -Djgroups.bind_addr=127.0.0.1"
      
      # -----------------------------
      # 운영 환경 권장 옵션
      # -----------------------------
      KC_LOG_LEVEL: INFO
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true

      # Realm 자동 import
      KC_IMPORT: /opt/keycloak/data/import

    volumes:
      # 🎨 커스텀 테마
      - /APP/keycloak/themes:/opt/keycloak/themes

      # 🔌 커스텀 Provider (SPI)
      - /APP/keycloak/providers:/opt/keycloak/providers

      # 📦 Realm import/export
      - /APP/keycloak/import:/opt/keycloak/data/import
      
    depends_on:
      - postgres

    # 컨테이너 재시작 정책
    restart: unless-stopped

  # ===============================
  # PostgreSQL (Keycloak 전용 DB)
  # ===============================
  postgres:
    container_name: keycloak-postgres
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpass
    volumes:
      # DB 데이터 영속화 (컨테이너 재시작 시 데이터 유지)
      - /APP/keycloak/kc_pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: unless-stopped
